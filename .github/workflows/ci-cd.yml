name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: memory-backend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: memory-backend

      - name: Run Linter
        run: npm run lint
        working-directory: memory-backend

      - name: Run Prisma Client Generation
        run: npx prisma generate
        working-directory: memory-backend

      # Every *.spec.ts directly under test/ — an explicit file list let suites
      # rot unnoticed once they stopped compiling. test/e2e/ is excluded: it
      # needs a live SQLite database and Redis.
      - name: Run Unit Tests
        run: npx jest --rootDir=. --testPathPatterns='test/[^/]+\.spec\.ts$'
        working-directory: memory-backend

      - name: Build Application
        run: npm run build
        working-directory: memory-backend

  flutter:
    name: Flutter Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get
        working-directory: memory

      # --fatal-infos keeps the tree at zero diagnostics, not just zero errors.
      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings
        working-directory: memory

      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed lib test
        working-directory: memory

      - name: Run Tests
        run: flutter test
        working-directory: memory

      - name: Build Debug APK
        run: flutter build apk --debug
        working-directory: memory

  cd:
    name: Continuous Deployment
    needs: [ci, flutter]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Secrets management configuration (Doppler CLI setup example)
      - name: Install Doppler CLI
        run: |
          (curl -Ls https://cli.doppler.com/install.sh || wget -qO- https://cli.doppler.com/install.sh) | sudo sh

      # Build and push Docker container steps
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t memory-backend:latest ./memory-backend

      # Example deployment steps (GCP Cloud Run deployment configuration):
      # - name: Authenticate to Cloud Provider
